<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> SMART RT 07 </title>

  <!-- Favicon harus direct link ke file gambar -->
  <link rel="icon" href="https://drive.google.com/thumbnail?id=1jGoCivsqGCY0YqK4TrDzP33byfH5wYIt&sz=w100" type="image/x-icon">

  <style>
    body { margin: 0; background: #f7f7f7; }
    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>

  <!-- Script untuk marquee title -->
  <script>
    let titleText = " SMART RT 07 ";
    let position = 0;

    function scrollTitle() {
      document.title = titleText.substring(position) + titleText.substring(0, position);
      position = (position + 1) % titleText.length;
      setTimeout(scrollTitle, 250); // kecepatan scroll
    }

    window.onload = scrollTitle;
  </script>
</head>
<body>
  <iframe src="https://script.google.com/macros/s/AKfycbz4QFHhTX9lm2Y_JbinO56fX1PLnJLH0-M7Vs0eS4V0oycMFygmVn0cO8kz1u8b07tUWg/exec"></iframe>
</body>
